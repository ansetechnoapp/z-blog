name: Deploy blog.zodev.live

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: z-blog-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      ZODBACK_API_TOKEN: ${{ secrets.ZODBACK_API_TOKEN }}
      ZODBACK_API_BASE_URL: ${{ vars.ZODBACK_API_BASE_URL || 'https://integrations-api.zodev.live' }}
      ZODBACK_PROJECT_ID: ${{ vars.ZODBACK_PROJECT_ID || '1' }}

    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.9'

      - name: Validate public bundle
        shell: bash
        run: |
          set -euo pipefail
          bun test
          bun build js/elevare.js --outfile /tmp/elevare.bundle.js
          bun build worker.js --outfile /tmp/blog-worker.bundle.js
          if rg -i 'API_TOKEN|zb_[A-Za-z0-9]|Authorization:|x-api-key:|Bearer ' /tmp/elevare.bundle.js; then
            echo 'A credential-like value was found in the public SPA bundle.' >&2
            exit 1
          fi

      - name: Validate Cloudflare credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$ZODBACK_API_TOKEN"
          test -n "$ZODBACK_API_BASE_URL"
          test -n "$ZODBACK_PROJECT_ID"
          bunx --bun wrangler@4.112.0 whoami

      - name: Configure Worker secrets
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "$ZODBACK_API_BASE_URL" | bunx --bun wrangler@4.112.0 secret put ZODBACK_API_BASE_URL
          printf '%s' "$ZODBACK_PROJECT_ID" | bunx --bun wrangler@4.112.0 secret put ZODBACK_PROJECT_ID
          printf '%s' "$ZODBACK_API_TOKEN" | bunx --bun wrangler@4.112.0 secret put ZODBACK_API_TOKEN

      - name: Deploy Worker and assets
        run: bunx --bun wrangler@4.112.0 deploy

      - name: Smoke test production API
        shell: bash
        run: |
          set -euo pipefail
          response="$(curl --fail --silent --show-error --location --retry 8 --retry-delay 5 \
            https://blog.zodev.live/api/blog/v1/public/all)"
          printf '%s' "$response" | jq -e '
            .success == true and
            (.data.posts | type == "array") and
            (.data.categories | type == "array") and
            (.data.authors | type == "array")
          ' >/dev/null
          echo 'blog.zodev.live Worker API smoke test passed.'
